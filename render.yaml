services:
  - type: web
    name: reimbursement-intake
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Required — paste your current token (run `uip auth token` locally) ──
      - key: UIPATH_ACCESS_TOKEN
        sync: false        # must be set manually in the Render dashboard

      # ── Pre-filled with hackathon tenant values ───────────────────────────
      - key: UIPATH_BASE_URL
        value: https://staging.uipath.com/hackathon26_332/DefaultTenant
      - key: UIPATH_FOLDER_ID
        value: "3054578"
      - key: UIPATH_CASE_FOLDER_NUMERIC_ID
        value: "3154132"
      - key: UIPATH_BUCKET_ID
        value: "199727"
      - key: UIPATH_CASE_RELEASE_KEY
        value: 8602dfb7-4304-4768-b853-544f1ef7d972
